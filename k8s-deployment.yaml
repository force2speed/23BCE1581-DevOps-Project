# Kubernetes Deployment Manifest for ABC Technologies Website
# Deploys 2 replicas of the nginx-based website

apiVersion: apps/v1
kind: Deployment
metadata:
  name: abc-tech-website
  namespace: default
  labels:
    app: abc-tech-website
    environment: production
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: abc-tech-website
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: abc-tech-website
        environment: production
        tier: frontend
    spec:
      containers:
        - name: nginx
          image: abc-tech-website:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      schedulerName: default-scheduler
